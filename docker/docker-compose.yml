services:
  mysql:
    image: mariadb:10.11
    container_name: zabbix-mysql
    env_file:
      - .env
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: zabbix-server
    restart: unless-stopped
    depends_on:
        mysql:
          condition: service_healthy
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ZBX_DBNAME: ${MYSQL_DATABASE}
      ZBX_DBUSER: ${MYSQL_USER}
      ZBX_DBPASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "10051:10051"

  zabbix-frontend:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
    container_name: zabbix-frontend
    restart: unless-stopped
    depends_on:
      - mysql
      - zabbix-server
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ZBX_DBNAME: ${MYSQL_DATABASE}
      ZBX_DBUSER: ${MYSQL_USER}
      ZBX_DBPASSWORD: ${MYSQL_PASSWORD}
      PHP_TZ: America/Sao_Paulo
    ports:
      - "8080:8080"

  grafana:
    image: grafana/grafana:latest
    container_name: lab-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards_json:/var/lib/grafana/dashboards_json
volumes:
  mysql_data:
  grafana_data:

